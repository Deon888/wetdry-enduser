<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洗地机 / 机器人故障自助诊断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EEF3F1;
    --surface: #FFFFFF;
    --surface-tint: #E4EBE8;
    --ink: #14232A;
    --ink-soft: #55686C;
    --ink-faint: #8B9B9C;
    --teal: #0C6E78;
    --teal-deep: #094D54;
    --teal-tint: #E3F0EF;
    --alert: #C7402A;
    --alert-bg: #FBE9E4;
    --alert-line: #EFC3B8;
    --resolved: #1E8F63;
    --resolved-bg: #E4F4EC;
    --resolved-line: #BFE3CE;
    --radius: 14px;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }

  .page{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: clamp(20px, 5vw, 56px) 16px 64px;
  }

  .shell{
    width: 100%;
    max-width: 560px;
  }

  header{ margin-bottom: 22px; }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--teal-deep);
    text-transform: uppercase;
    margin: 0 0 14px;
  }

  h1{
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: clamp(24px, 5.4vw, 32px);
    line-height: 1.32;
    margin: 0 0 12px;
    color: var(--ink);
  }

  .subhead{
    color: var(--ink-soft);
    font-size: 15px;
    margin: 0;
    max-width: 52ch;
  }

  .trail{
    display: none;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .trail-chip{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.02em;
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid var(--surface-tint);
    background: var(--surface);
    color: var(--ink-soft);
    cursor: pointer;
  }

  .trail-chip:hover{ border-color: var(--teal); color: var(--teal-deep); }
  .trail-sep{ color: var(--ink-faint); font-size: 12px; }

  #wizard{ margin-bottom: 4px; }

  .step-panel{
    background: var(--surface);
    border: 1.5px solid var(--surface-tint);
    border-radius: var(--radius);
    padding: 22px;
  }

  .step-eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal-deep);
    margin: 0 0 8px;
  }

  .step-question{
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: clamp(19px, 4.4vw, 22px);
    margin: 0;
    line-height: 1.4;
  }

  .option-grid{
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 20px;
  }

  .option-card{
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    text-align: left;
    padding: 16px 18px;
    border-radius: 12px;
    border: 1.5px solid var(--surface-tint);
    background: var(--surface);
    color: inherit;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.1s ease;
  }

  .option-card:hover{ border-color: var(--teal); }
  .option-card:active{ transform: scale(0.99); }
  .option-card:focus-visible{ outline: 2px solid var(--teal); outline-offset: -2px; }

  .option-icon{
    flex: 0 0 auto;
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--teal-tint);
    color: var(--teal-deep);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .option-icon svg{ width: 20px; height: 20px; }

  .option-text{ display: flex; flex-direction: column; gap: 2px; }
  .option-title{ font-weight: 700; font-size: 16px; }
  .option-desc{ font-size: 13px; color: var(--ink-faint); }

  .option-card--plain{
    padding: 14px 16px;
    font-size: 14.5px;
    font-weight: 500;
  }

  .step-note{
    font-size: 13px;
    color: #8A6A22;
    background: #FCF3DC;
    border: 1px solid #F0DCA0;
    border-radius: 10px;
    padding: 12px 14px;
    margin: 16px 0 0;
  }

  .result{
    border-radius: var(--radius);
    padding: 22px;
    background: var(--surface);
    border: 1.5px solid var(--surface-tint);
  }

  .result[data-state="alert"]{ background: var(--alert-bg); border-color: var(--alert-line); }
  .result[data-state="resolved"]{ background: var(--resolved-bg); border-color: var(--resolved-line); }

  .result-status{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 0 8px;
    color: var(--ink-faint);
  }

  .result[data-state="alert"] .result-status{ color: var(--alert); }
  .result[data-state="resolved"] .result-status{ color: var(--resolved); }

  .result-title{
    font-family: 'Noto Serif SC', serif;
    font-weight: 900;
    font-size: 19px;
    margin: 0 0 8px;
  }

  .result-body{
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0;
  }

  .result-list{
    list-style: none;
    margin: 14px 0 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .result-list li{
    font-size: 13.5px;
    background: rgba(255,255,255,0.6);
    border: 1px solid var(--alert-line);
    border-radius: 8px;
    padding: 9px 12px;
  }

  .result-list li b{ color: var(--alert); }

  .result-actions{
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .btn-whatsapp{
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 700;
    padding: 11px 18px;
    border-radius: 10px;
    border: none;
    background: #25D366;
    color: #fff;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }

  .btn-whatsapp:hover{ background: #1DA851; }
  .btn-whatsapp svg{ width: 16px; height: 16px; }

  .btn-copy{
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 700;
    padding: 11px 18px;
    border-radius: 10px;
    border: 1.5px solid var(--alert-line);
    background: transparent;
    color: var(--alert);
    cursor: pointer;
  }

  .btn-copy:hover{ background: rgba(199,64,42,0.06); }

  .btn-restart{
    margin-top: 14px;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12.5px;
    color: var(--ink-soft);
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }

  .btn-restart:hover{ color: var(--ink); }

  footer{
    margin-top: 22px;
    font-size: 12px;
    color: var(--ink-faint);
    text-align: center;
  }
</style>
</head>
<body>

<div class="page">
  <div class="shell">
    <header>
      <p class="eyebrow">自助故障诊断 · SELF-CHECK</p>
      <h1>3步自查，看看你的机器是否需要进行售后</h1>
      <p class="subhead">请按提示逐步选择，系统会根据您的情况自动判断是否需要联系客户处理。</p>
    </header>

    <nav class="trail" id="trail" aria-label="已选择的步骤"></nav>

    <section id="wizard"></section>

    <footer>诊断结果仅供参考，最终以客服人工判断为准。</footer>
  </div>
</div>

<script>
  // TODO：请替换成客服的 WhatsApp 号码（国家代码开头，不加 + 号，例如马来西亚号码写成 60123456789）
  const WHATSAPP_NUMBER = '60123456789';

  const state = { product: null, issue: null, troubleshoot: null };

  const icons = {
    washer: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v9"/><rect x="5" y="12" width="14" height="6" rx="2"/><circle cx="8.5" cy="20" r="1.3" fill="currentColor" stroke="none"/><circle cx="15.5" cy="20" r="1.3" fill="currentColor" stroke="none"/></svg>',
    robot: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="7"/><circle cx="9.5" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="14.5" cy="12" r="1" fill="currentColor" stroke="none"/><path d="M9 16c1 .8 5 .8 6 0"/></svg>',
    leak: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3s6 6.5 6 11a6 6 0 0 1-12 0c0-4.5 6-11 6-11z"/></svg>',
    charge: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v7"/><path d="M6.5 6.5a8 8 0 1 0 11 0"/></svg>',
    noise: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h2v3H3z"/><path d="M7 9h2v9H7z"/><path d="M11 5h2v17h-2z"/><path d="M15 9h2v9h-2z"/><path d="M19 12h2v3h-2z"/></svg>',
    chat: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 0 1-12.4 7.5L3 21l2.1-5.5A8.5 8.5 0 1 1 21 11.5z"/><path d="M8.5 10.5c.3 2.5 2.5 4.7 5 5"/></svg>'
  };

  const productLabels = { washer: '洗地机', robot: '机器人' };
  const issueLabels = { leak: '漏水', charge: '无法充电', noise: '异响' };

  function determineStep(){
    if (!state.product) return 'product';
    if (!state.issue) return 'issue';
    if (state.issue !== 'leak' && !state.troubleshoot) return 'troubleshoot';
    return 'result';
  }

  function isConfirmed(){
    if (state.issue === 'leak') return true;
    return state.troubleshoot === 'confirmed';
  }

  function reasonText(){
    if (state.issue === 'leak') return '机器出现漏水情况，建议直接安排处理';
    if (state.issue === 'charge') {
      return state.troubleshoot === 'confirmed'
        ? '换了插座/充电器测试，仍然无法充电'
        : '换了插座/充电器后，可以正常充电了';
    }
    if (state.issue === 'noise') {
      return state.troubleshoot === 'confirmed'
        ? '清洁滚刷和滤网后，异响仍然存在'
        : '清洁滚刷和滤网后，异响消失了';
    }
    return '';
  }

  function renderTrail(){
    const trailEl = document.getElementById('trail');
    const chips = [];
    if (state.product) chips.push('<button class="trail-chip" data-action="goto" data-step="product" type="button">' + productLabels[state.product] + '</button>');
    if (state.issue) chips.push('<button class="trail-chip" data-action="goto" data-step="issue" type="button">' + issueLabels[state.issue] + '</button>');
    trailEl.innerHTML = chips.join('<span class="trail-sep">›</span>');
    trailEl.style.display = chips.length ? 'flex' : 'none';
  }

  function renderWizard(){
    const wizardEl = document.getElementById('wizard');
    const step = determineStep();
    let html = '';

    if (step === 'product') {
      html = '' +
        '<div class="step-panel">' +
        '<p class="step-eyebrow">第 1 步</p>' +
        '<h2 class="step-question">您使用的是哪一种设备？</h2>' +
        '<div class="option-grid">' +
        '<button class="option-card" data-action="select-product" data-value="washer" type="button">' +
        '<span class="option-icon">' + icons.washer + '</span>' +
        '<span class="option-text"><span class="option-title">洗地机</span><span class="option-desc">手持或推行式洗地 / 拖地机</span></span>' +
        '</button>' +
        '<button class="option-card" data-action="select-product" data-value="robot" type="button">' +
        '<span class="option-icon">' + icons.robot + '</span>' +
        '<span class="option-text"><span class="option-title">机器人</span><span class="option-desc">自动扫地 / 扫拖机器人</span></span>' +
        '</button>' +
        '</div></div>';
    } else if (step === 'issue') {
      if (state.product === 'robot') {
        html = '' +
          '<div class="step-panel">' +
          '<p class="step-eyebrow">第 2 步</p>' +
          '<h2 class="step-question">您遇到的情况是？</h2>' +
          '<p class="step-note">机器人的故障选项还在整理中，暂时无法自助诊断，建议直接联系客服协助处理。</p>' +
          '<div class="option-grid">' +
          '<button class="btn-whatsapp" data-action="contact-robot" type="button">' + icons.chat + ' 通过 WhatsApp 联系客服</button>' +
          '</div></div>';
      } else {
        html = '' +
          '<div class="step-panel">' +
          '<p class="step-eyebrow">第 2 步</p>' +
          '<h2 class="step-question">您遇到的情况是？</h2>' +
          '<div class="option-grid">' +
          '<button class="option-card" data-action="select-issue" data-value="leak" type="button">' +
          '<span class="option-icon">' + icons.leak + '</span>' +
          '<span class="option-text"><span class="option-title">漏水</span><span class="option-desc">机身或水箱有水渗出</span></span>' +
          '</button>' +
          '<button class="option-card" data-action="select-issue" data-value="charge" type="button">' +
          '<span class="option-icon">' + icons.charge + '</span>' +
          '<span class="option-text"><span class="option-title">无法充电</span><span class="option-desc">无法正常充电或开机</span></span>' +
          '</button>' +
          '<button class="option-card" data-action="select-issue" data-value="noise" type="button">' +
          '<span class="option-icon">' + icons.noise + '</span>' +
          '<span class="option-text"><span class="option-title">异响</span><span class="option-desc">运行时有不正常的声音</span></span>' +
          '</button>' +
          '</div></div>';
      }
    } else if (step === 'troubleshoot') {
      const q = state.issue === 'charge'
        ? '您是否已经尝试更换其他插座或充电器测试？'
        : '您是否已拆下滚刷和滤网清洁后，再重新测试？';
      const yesText = state.issue === 'charge' ? '换了插座/充电器，仍然无法充电' : '清洁滚刷和滤网后，异响仍然存在';
      const noText = state.issue === 'charge' ? '换了之后，可以正常充电了' : '清洁后，异响消失了';
      html = '' +
        '<div class="step-panel">' +
        '<p class="step-eyebrow">第 3 步</p>' +
        '<h2 class="step-question">' + q + '</h2>' +
        '<div class="option-grid">' +
        '<button class="option-card option-card--plain" data-action="select-troubleshoot" data-value="confirmed" type="button">' + yesText + '</button>' +
        '<button class="option-card option-card--plain" data-action="select-troubleshoot" data-value="resolved" type="button">' + noText + '</button>' +
        '</div></div>';
    } else {
      html = renderResultHtml();
    }

    wizardEl.innerHTML = html;
  }

  function renderResultHtml(){
    if (isConfirmed()) {
      return '' +
        '<div class="result" data-state="alert">' +
        '<p class="result-status">STATUS · 建议联系客户</p>' +
        '<h2 class="result-title">建议尽快联系客户</h2>' +
        '<p class="result-body">以下是客户自行排查后的情况，建议提供以下信息联系客服处理：</p>' +
        '<ul class="result-list">' +
        '<li><b>设备类型</b> — ' + productLabels[state.product] + '</li>' +
        '<li><b>' + issueLabels[state.issue] + '</b> — ' + reasonText() + '</li>' +
        '</ul>' +
        '<div class="result-actions">' +
        '<button class="btn-whatsapp" data-action="whatsapp" type="button">' + icons.chat + ' 通过 WhatsApp 联系客服</button>' +
        '<button class="btn-copy" id="copyBtn" data-action="copy" type="button">复制诊断结果</button>' +
        '</div>' +
        '<button class="btn-restart" data-action="restart" type="button">重新诊断</button>' +
        '</div>';
    }
    return '' +
      '<div class="result" data-state="resolved">' +
      '<p class="result-status">STATUS · 暂无需联系客户</p>' +
      '<h2 class="result-title">问题已初步排除</h2>' +
      '<p class="result-body">您排查的情况目前已经解决，暂时无需联系客户。如果之后情况再次出现，欢迎随时回来重新诊断。</p>' +
      '<button class="btn-restart" data-action="restart" type="button">重新诊断</button>' +
      '</div>';
  }

  function render(){
    renderTrail();
    renderWizard();
  }

  function buildSummaryText(){
    const lines = ['故障自诊断结果：'];
    lines.push('• 设备类型：' + productLabels[state.product]);
    lines.push('• ' + issueLabels[state.issue] + '：' + reasonText());
    lines.push('建议联系客户跟进处理。');
    return lines.join('\n');
  }

  function copySummary(){
    const text = buildSummaryText();

    function fallbackCopy(){
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(err) {}
      document.body.removeChild(ta);
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }

    const btn = document.getElementById('copyBtn');
    if (btn) {
      const original = btn.textContent;
      btn.textContent = '已复制 ✓';
      setTimeout(function(){ btn.textContent = original; }, 1800);
    }
  }

  function openWhatsApp(){
    const text = buildSummaryText();
    const url = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  }

  function openWhatsAppRobot(){
    const text = '您好，我使用的是机器人产品，遇到问题想咨询，麻烦协助处理。';
    const url = 'https://wa.me/' + WHATSAPP_NUMBER + '?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  }

  document.querySelector('.shell').addEventListener('click', function(e){
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;

    if (action === 'select-product') {
      state.product = el.dataset.value;
      state.issue = null;
      state.troubleshoot = null;
    } else if (action === 'select-issue') {
      state.issue = el.dataset.value;
      state.troubleshoot = null;
    } else if (action === 'select-troubleshoot') {
      state.troubleshoot = el.dataset.value;
    } else if (action === 'goto') {
      const step = el.dataset.step;
      if (step === 'product') {
        state.product = null;
        state.issue = null;
        state.troubleshoot = null;
      } else if (step === 'issue') {
        state.issue = null;
        state.troubleshoot = null;
      }
    } else if (action === 'restart') {
      state.product = null;
      state.issue = null;
      state.troubleshoot = null;
    } else if (action === 'whatsapp') {
      openWhatsApp();
      return;
    } else if (action === 'contact-robot') {
      openWhatsAppRobot();
      return;
    } else if (action === 'copy') {
      copySummary();
      return;
    }

    render();
  });

  render();
</script>

</body>
</html>
